version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-playertracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    networks:
      - playertracker-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-playertracker}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - playertracker-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.api.rule=Host(`api.${DOMAIN:-localhost}`)'
      - 'traefik.http.routers.api.tls=true'
      - 'traefik.http.routers.api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.api.loadbalancer.server.port=3001'

  # Web App Service
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${PROD_API_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${PROD_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'
    networks:
      - playertracker-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.web.rule=Host(`app.${DOMAIN:-localhost}`)'
      - 'traefik.http.routers.web.tls=true'
      - 'traefik.http.routers.web.tls.certresolver=letsencrypt'
      - 'traefik.http.services.web.loadbalancer.server.port=3000'

  # Landing Page Service
  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${PROD_API_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${PROD_API_URL:-http://localhost:3001}
    ports:
      - '3002:3002'
    networks:
      - playertracker-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.landing.rule=Host(`${DOMAIN:-localhost}`)'
      - 'traefik.http.routers.landing.tls=true'
      - 'traefik.http.routers.landing.tls.certresolver=letsencrypt'
      - 'traefik.http.services.landing.loadbalancer.server.port=3002'

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - '--api.dashboard=true'
      - '--api.insecure=false'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.letsencrypt.acme.tlschallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
      - '--global.sendanonymoususagestatistics=false'
      # Redirect HTTP to HTTPS
      - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
      - '--entrypoints.web.http.redirections.entrypoint.scheme=https'
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080' # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - playertracker-network
    environment:
      - TRAEFIK_API_DASHBOARD=true
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)'
      - 'traefik.http.routers.dashboard.tls=true'
      - 'traefik.http.routers.dashboard.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.dashboard.service=api@internal'
      - 'traefik.http.routers.dashboard.middlewares=dashboard-auth'
      - 'traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_USER:-admin}:${TRAEFIK_DASHBOARD_PASSWORD:-$$2y$$10$$A7U8pZW6qQV/QqB7S8C3S.5XQ1ZtL6Y9F8L2eJbdX0p8LfGz9Y0LC}'

networks:
  playertracker-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  traefik_letsencrypt:
    driver: local
