services:
  # PostgreSQL Database for development
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: playertracker-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-playertracker}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - playertracker-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service (Development mode with hot reload)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: playertracker-api-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-playertracker}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PORT=3001
    volumes:
      # Mount source code for hot reload
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./turbo.json:/app/turbo.json
      # Exclude node_modules to avoid conflicts between host and container
      - /app/node_modules
      - /app/apps/api/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - playertracker-dev-network
    command: sh -c "pnpm install && cd apps/api && npx prisma generate && pnpm start:dev"

  # Web App Service (Development mode with hot reload)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: playertracker-web-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Enable Next.js Fast Refresh
      - WATCHPACK_POLLING=true
    volumes:
      # Mount source code for hot reload
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./turbo.json:/app/turbo.json
      # Exclude node_modules and .next to avoid conflicts
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - playertracker-dev-network
    command: sh -c "pnpm install && cd apps/web && pnpm dev"

networks:
  playertracker-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
